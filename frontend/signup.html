<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Galati City</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="js\validation.js" defer></script>

</head>
<body>


<div class="wrapper">
    <h1>Sign Up</h1>
    <p id="mesaj-eroare"></p>
    <form id="form-signup">
        <div>
            <label for="nume"><i data-lucide="user-round"></i></label>
            <input id="nume" type="text" name="firstname" placeholder="FirstName">
        </div>
        <div>
            <label for="email"><i data-lucide="at-sign"></i></label>
            <input id="email" type="email" name="email" placeholder="Email">
        </div>
        <div>
            <label for="parola"><i data-lucide="key-round"></i></label>
            <input id="parola" type="password" name="password" placeholder="Password">
        </div>
        <div>
            <label for="repeat_password_input"><i data-lucide="rotate-ccw-key"></i></label>
            <input type="password" name="repeat-password" id="repeat_password_input" placeholder="Repeat-Password">
        </div>
        <button type="submit">Signup</button>
    </form>
    <p>Already have an account? <a href="login.html">login</a></p>
    <video autoplay muted loop id="myVideo">
        <source src="../assets/VIDEO.mp4" type="video/mp4">
    </video>
</div>

<script src="js/events.js"></script>
<script>lucide.createIcons();</script>

</body>
</html>
